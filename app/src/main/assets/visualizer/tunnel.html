<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #coaster {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: none;
            background: #000;
        }

        #presetOverlay {
            position: fixed;
            left: 42px;
            bottom: 36px;
            z-index: 2;
            max-width: calc(100vw - 84px);
            padding: 12px 16px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.58);
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 180ms ease, transform 180ms ease;
        }

        #presetOverlay.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #presetState {
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #presetName {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0;
        }
    </style>
</head>
<body>
<canvas id="tunnel"></canvas>
<canvas id="coaster"></canvas>
<div id="presetOverlay" aria-hidden="true">
    <div id="presetState">Paused</div>
    <div id="presetName"></div>
</div>
<script src="avs-eel.js"></script>
<script src="avs-presets/neon-coaster.js"></script>
<script src="avs-presets/containment.js"></script>
<script src="avs-presets/speeder-3k.js"></script>
<script src="avs-presets/zero-g-maze-ii.js"></script>
<script src="avs-presets/zero-g-maze-iii.js"></script>
<script src="tunnel.js"></script>
</body>
</html>
